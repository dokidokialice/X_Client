name: Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create config file for build
        env:
          X_LIST_ID: ${{ secrets.X_LIST_ID }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_API_BASE_URL: ${{ secrets.X_API_BASE_URL }}
        run: |
          cat > app/src/main/assets/x_config.properties << EOF
          list_id=${X_LIST_ID:-ci_dummy_list_id}
          access_token=${X_ACCESS_TOKEN:-ci_dummy_access_token}
          api_base_url=${X_API_BASE_URL:-https://api.x.com/}
          EOF

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ github.sha }}
          path: app/build/reports/tests/testDebugUnitTest/
          if-no-files-found: ignore
          retention-days: 14

  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create config file for build
        env:
          X_LIST_ID: ${{ secrets.X_LIST_ID }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_API_BASE_URL: ${{ secrets.X_API_BASE_URL }}
        run: |
          cat > app/src/main/assets/x_config.properties << EOF
          list_id=${X_LIST_ID:-ci_dummy_list_id}
          access_token=${X_ACCESS_TOKEN:-ci_dummy_access_token}
          api_base_url=${X_API_BASE_URL:-https://api.x.com/}
          EOF

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
